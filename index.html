            const validItems = items.filter(isValidQuizItem);
            
            // 如果可用題目少於3題，顯示警告
            if (validItems.length < 3) {
                alert('本日課程可測驗的項目較少，建議先完成更多課程再進行測驗！');
                closeQuiz();
                return;
            }
            
            let questions = [...validItems];
            questions.sort(() => Math.random() - 0.5);
            quizQueue = questions.slice(0, Math.min(5, validItems.length));
            
            currentQuizIndex = 0;
            score = 0;
            quizOverlay.style.display = 'flex';
            renderQuizQuestion();
        }

        function renderQuizQuestion() {
            if (currentQuizIndex >= quizQueue.length) {
                showQuizResult();
                return;
            }

            const q = quizQueue[currentQuizIndex];
            const allItems = curriculum[select.value].items;
            
            // 使用共用函數過濾出有效的項目作為選項
            const validItems = allItems.filter(isValidQuizItem);
            
            let options = [q];
            while (options.length < 3 && options.length < validItems.length) {
                const randomItem = validItems[Math.floor(Math.random() * validItems.length)];
                if (!options.includes(randomItem)) {
                    options.push(randomItem);
                }
            }
            options.sort(() => Math.random() - 0.5);

            quizCard.innerHTML = `
                <button class="btn-close-quiz" onclick="closeQuiz()">×</button>
                <div class="quiz-score">Question ${currentQuizIndex + 1} / ${quizQueue.length}</div>
                <div class="quiz-question">如何說：<br>"${q.zh}" ?</div>
                <div class="quiz-options">
                    ${options.map(opt => `
                        <button class="option-btn" onclick="checkAnswer(this, '${opt.es.replace(/'/g, "\\'")}', '${q.es.replace(/'/g, "\\'")}')">
                            ${opt.es}
                        </button>
                    `).join('')}
                </div>
            `;
        }

            const buttons = document.querySelectorAll('.option-btn');

                score++;
                speak(correct);
            } else {
                btn.classList.add('wrong');
                buttons.forEach(b => {
                    if (b.innerText.includes(correct)) b.classList.add('correct');
                });
            }

        function answerGame(choice) {
            if (!gameState.active) return;
            clearTimeout(gameState.timer);

            const q = gameState.questions[gameState.currentIndex];
            const isCorrect = choice === q.answer;
            const buttons = gameCard.querySelectorAll('.game-choice-btn');

            // Stop timer animation
            const timerFill = document.getElementById('gameTimerFill');
            if (timerFill) {
                timerFill.style.animation = 'none';
                timerFill.style.width = timerFill.getBoundingClientRect().width + 'px';
            }

            buttons.forEach(btn => {
                btn.disabled = true;
                if (btn.textContent === q.answer) {
                    btn.classList.add('correct');
                }
                if (!isCorrect && btn.textContent === choice) {
                    btn.classList.add('wrong');
                }
            });

            // Show correct form
            const blankEl = gameCard.querySelector('.blank');
            if (blankEl) {
                blankEl.style.color = isCorrect ? 'var(--success)' : 'var(--error)';
                blankEl.style.borderColor = isCorrect ? 'var(--success)' : 'var(--error)';
                blankEl.textContent = q.form || q.answer;
            }

            if (isCorrect) {
                gameState.streak++;
                // Update progress dots immediately
                const dots = gameCard.querySelectorAll('.game-progress-dot');
                dots.forEach((dot, i) => {
                    if (i < gameState.streak) {
                        dot.classList.add('filled');
                        dot.textContent = '✓';
                    }
                });
                const label = gameCard.querySelector('.game-progress-label');
                if (label) label.textContent = `連續答對 ${gameState.streak} / 5`;

                if (gameState.streak >= 5) {
                    setTimeout(() => showGameResult(true), 800);
                    return;
                }
            } else {
                gameState.streak = 0;
                gameState.wrongAnswers.push(q);
                gameCard.classList.add('shake');
                // Reset progress dots
                const dots = gameCard.querySelectorAll('.game-progress-dot');
                dots.forEach(dot => { dot.classList.remove('filled'); dot.textContent = ''; });
                const label = gameCard.querySelector('.game-progress-label');
                if (label) label.textContent = '連續答對 0 / 5';
            }

            gameState.currentIndex++;
            setTimeout(() => renderGameQuestion(), 800);
        }

        function answerDoctor(part) {
            if (!gameState.active) return;
            clearTimeout(gameState.timer);

            const q = gameState.questions[gameState.currentIndex];
            const isCorrect = part === q.answer;

            // Stop timer animation
            const timerFill = document.getElementById('gameTimerFill');
            if (timerFill) {
                timerFill.style.animation = 'none';
                timerFill.style.width = timerFill.getBoundingClientRect().width + 'px';
            }

            // Disable all hotspots
            const hotspots = gameCard.querySelectorAll('.body-hotspot');
            hotspots.forEach(hs => {
                hs.style.pointerEvents = 'none';
                hs.classList.remove('glow');
                hs.style.animation = 'none';
                if (hs.dataset.part === q.answer) {
                    hs.classList.add('correct');
                }
                if (!isCorrect && hs.dataset.part === part) {
                    hs.classList.add('wrong');
                }
            });

            if (isCorrect) {
                gameState.streak++;
                const dots = gameCard.querySelectorAll('.game-progress-dot');
                dots.forEach((dot, i) => {
                    if (i < gameState.streak) {
                        dot.classList.add('filled');
                        dot.textContent = '✓';

                });

                    setTimeout(() => showGameResult(true), 800);
                    return;
                }

                gameState.streak = 0;
                gameState.wrongAnswers.push(q);
                gameCard.classList.add('shake');

                dots.forEach(dot => { dot.classList.remove('filled'); dot.textContent = ''; });
                const label = gameCard.querySelector('.game-progress-label');
                if (label) label.textContent = '連續答對 0 / 5';
            }

            gameState.currentIndex++;
            setTimeout(() => renderGameQuestion(), 800);
        }

        function gameTimeout() {
            if (!gameState.active) return;

            const q = gameState.questions[gameState.currentIndex];

            // Handle doctor level hotspots
            if (gameState.level === 'doctor') {
                const hotspots = gameCard.querySelectorAll('.body-hotspot');
                hotspots.forEach(hs => {
                    hs.style.pointerEvents = 'none';
                    hs.style.animation = 'none';
                    if (hs.dataset.part === q.answer) {
                        hs.classList.add('correct');
                    }
                });
            }

            // Handle regular button levels
            const buttons = gameCard.querySelectorAll('.game-choice-btn');
            buttons.forEach(btn => {
                btn.disabled = true;
                if (btn.textContent === q.answer) btn.classList.add('correct');
            });

            const blankEl = gameCard.querySelector('.blank');
            if (blankEl) {
                blankEl.style.color = 'var(--error)';
                blankEl.style.borderColor = 'var(--error)';
                blankEl.textContent = q.form || q.answer;
            }

            gameState.streak = 0;
            gameState.wrongAnswers.push(q);
            gameCard.classList.add('shake');
            const dots = gameCard.querySelectorAll('.game-progress-dot');
            dots.forEach(dot => { dot.classList.remove('filled'); dot.textContent = ''; });
            const label = gameCard.querySelector('.game-progress-label');
            if (label) label.textContent = '連續答對 0 / 5（超時！）';

            gameState.currentIndex++;
            setTimeout(() => renderGameQuestion(), 800);
        }

        function buildWrongReview() {
            if (gameState.wrongAnswers.length === 0) return '';
            const level = gameState.level;
            const items = gameState.wrongAnswers.map(q => {
                let questionText = '';
                if (level === 'serEstar') {
                    questionText = q.sentence.replace('___', `<strong>${q.form || q.answer}</strong>`);
                } else if (level === 'social') {
                    questionText = `${q.context}：「${q.incoming}」`;
                } else {
                    questionText = q.prompt || q.sentence || '';
                }
                return `
                    <div style="background:#f8f8f8;border-radius:10px;padding:12px;margin-bottom:8px;text-align:left">
                        <div style="font-size:0.9rem;color:#333;margin-bottom:4px">${questionText}</div>
                        <div style="font-size:0.85rem;color:var(--primary);font-weight:600">✓ 正確答案：${q.answer}</div>
                        <div style="font-size:0.8rem;color:#888;margin-top:4px">💡 ${q.hint}</div>
                    </div>`;
            }).join('');
            return `
                <div style="margin-top:20px;text-align:left;max-height:280px;overflow-y:auto">
                    <div style="font-size:0.95rem;font-weight:600;color:#555;margin-bottom:8px">📝 答錯的題目：</div>
                    ${items}

        }

            clearTimeout(gameState.timer);

            const winMessages = {
                serEstar: '你已經掌握 Ser 和 Estar 的用法了！',
                waiter: '你已經是最強服務生了！',
                bomb: '炸彈已拆除！你的句型超級熟練！',
                taxi: '你已經是最可靠的計程車司機了！方向感滿分！',
                doctor: '你已經是合格的急診醫生了！身體部位全掌握！',
                social: '你已經是社交達人了！西班牙語對話毫無障礙！'
            };
            const winMsg = winMessages[gameState.level] || '恭喜過關！';
            const wrongReview = buildWrongReview();

            if (won) {
                gameCard.innerHTML = `
                    <div class="game-result">
                        <div class="game-result-icon">🏆</div>
                        <div class="game-result-title">恭喜過關！</div>
                        <div class="game-result-msg">${winMsg}<br>連續答對 5 題，太厲害了！</div>
                        ${wrongReview}
                        <button class="game-result-btn primary" style="margin-top:16px" onclick="closeGame()">完成</button>
                    </div>
                `;
            } else {
                gameCard.innerHTML = `
                    <div class="game-result">
                        <div class="game-result-icon">💪</div>
                        <div class="game-result-title">再試一次！</div>
                        <div class="game-result-msg">10 題用完但未能連續答對 5 題。<br>多練習幾次就能掌握！</div>
                        ${wrongReview}
                        <button class="game-result-btn primary" style="margin-top:16px" onclick="startGame('${gameState.level}')">再挑戰一次</button>
                        <button class="game-result-btn secondary" onclick="closeGame()">返回課程</button>
                    </div>
                `;
            }
        }

        function closeGame() {
            gameState.active = false;
            clearTimeout(gameState.timer);
            gameOverlay.style.display = 'none';
        }

    </script>
</body>
</html>
